<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GTO Drill</title>
  <meta name="theme-color" content="#0f1a24" />
  <meta name="description" content="A GTO poker trainer — read each spot, commit your answer and confidence, then see the GTO line and how the crowd played the same hand." />
  <!-- Open Graph / Twitter — the rich link-preview card. og:image MUST be an
       absolute URL: a preview crawler has no page context to resolve a
       relative path, and it fetches the image as its own HTTP request. -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mondrianaire.github.io/gto-drill/" />
  <meta property="og:title" content="GTO Drill — crowdsourced GTO poker trainer" />
  <meta property="og:description" content="Read the spot, call the line, rate your read — then see the GTO answer and how the crowd played the same hand." />
  <meta property="og:image" content="https://mondrianaire.github.io/gto-drill/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="GTO Drill — a crowdsourced GTO poker trainer" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://mondrianaire.github.io/gto-drill/og-image.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
  <link rel="stylesheet" href="./styles/app.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">GTO Drill <span class="app-version" id="app-version" title="Build version — if this isn't the latest, hard-refresh (Ctrl+Shift+R) to clear the cache"></span></h1>
    <div id="header-user" class="header-user"></div>
  </header>
  <main id="app-root" class="app-root">
    <p class="boot-state" id="boot-state">Loading…</p>
  </main>
  <footer class="app-footer">
    <p class="muted">GTO Drill — a crowdsourced GTO poker trainer.</p>
  </footer>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
